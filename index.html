<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="猫钓鱼">
    <meta name="theme-color" content="#4ECDC4">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <title>小猫去钓鱼 🐱🎣</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
        }
        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 0.3em;
            text-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
        }
        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(255,255,255,0.6);
            margin-bottom: 2em;
        }
        .games {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(12px, 3vw, 24px);
        }
        .game-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: clamp(16px, 4vw, 32px) clamp(12px, 3vw, 24px);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .game-card:active {
            transform: scale(0.95);
            background: rgba(78, 205, 196, 0.2);
            border-color: #4ECDC4;
        }
        .game-emoji {
            font-size: clamp(2.5rem, 8vw, 4rem);
        }
        .game-name {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 600;
        }
        .game-desc {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(255,255,255,0.5);
        }
        .offline-hint {
            margin-top: 1.5em;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            color: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 小猫去钓鱼 🎣</h1>
        <p class="subtitle">选择一个游戏开始吧</p>
        <div class="games">
            <a class="game-card" href="./小猫排队/game-xmdy.html">
                <div class="game-emoji">🐱</div>
                <div class="game-name">小猫排队</div>
                <div class="game-desc">从小到大排序</div>
            </a>
            <a class="game-card" href="./小猫钓鱼/game-xmdy.html">
                <div class="game-emoji">🎣</div>
                <div class="game-name">小猫钓鱼</div>
                <div class="game-desc">数字排序认知</div>
            </a>
            <a class="game-card" href="./收鱼竿/game-xmdy.html">
                <div class="game-emoji">🪄</div>
                <div class="game-name">收鱼竿</div>
                <div class="game-desc">长短排列</div>
            </a>
            <a class="game-card" href="./晒小鱼/game-xmdy.html">
                <div class="game-emoji">🐟</div>
                <div class="game-name">晒小鱼</div>
                <div class="game-desc">大小排列</div>
            </a>
        </div>
        <p class="offline-hint">💡 添加到主屏幕后可离线使用</p>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('[PWA] Service Worker 已注册'))
                .catch(err => console.error('[PWA] 注册失败:', err));
        }
    </script>
</body>
</html>
